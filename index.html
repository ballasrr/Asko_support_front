<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Отзыв — АСКО</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* весь твой CSS здесь остаётся без изменений */
  </style>
</head>
<body>

  <!-- весь твой HTML-контент остаётся здесь без изменений -->
  <div class="container">
    <div class="header">
      <!-- логотип и заголовок -->
    </div>

    <form id="review-form">
      <!-- все поля: select, input, textarea, button -->
    </form>
  </div>

  <!-- ←←← ВСТАВЛЯЙ ВСЮ ЭТУ ЧАСТЬ СЮДА (в самый конец <body>, перед </body>) -->
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.MainButton.setText("Отправить").show();

    const stations = {
      "1": "АСКО-Центр (ул. Ленина, 15)",
      "2": "АСКО-Север (пр. Мира, 78)",
      "3": "АСКО-Юг (ул. Победы, 112)",
      "4": "АСКО-Запад (ул. Гагарина, 45)",
      "5": "АСКО-Восток (ул. Советская, 201)"
    };

    const form = document.getElementById("review-form");
    const submitBtn = document.getElementById("submit-btn");
    const required = ["station", "name", "surname", "phone", "review"];

    let isSubmitting = false;

    function checkForm() {
      if (isSubmitting) return;
      let valid = true;
      required.forEach(id => {
        if (!document.getElementById(id).value.trim()) valid = false;
      });
      submitBtn.disabled = !valid;
      tg.MainButton[valid ? "enable" : "disable"]();
    }

    form.querySelectorAll("input, textarea, select").forEach(el => {
      el.addEventListener("input", checkForm);
      el.addEventListener("change", checkForm);
    });

    form.addEventListener("submit", async e => {
      e.preventDefault();
      if (isSubmitting) return;

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Отправка...";
      tg.MainButton.showProgress(true);

      const selectedId = document.getElementById("station").value;
      const stationName = stations[selectedId];

      const data = {
        timestamp: new Date().toISOString().slice(0, 19).replace("T", " "),
        station_id: Number(selectedId),
        station_name: stationName,
        name: document.getElementById("name").value.trim(),
        surname: document.getElementById("surname").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        review: document.getElementById("review").value.trim(),
        initData: tg.initData
      };

      try {
        const res = await fetch("https://твой-домен.com/api/reviews", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Requested-With": "TelegramMiniApp"
          },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || "Ошибка сервера");
        }

        submitBtn.textContent = "Отправлено ✓";
        submitBtn.classList.add("sent");
        submitBtn.disabled = true;

        tg.MainButton.hideProgress();
        tg.showPopup({
          title: "Спасибо!",
          message: "Отзыв отправлен. Мы свяжемся с вами в ближайшее время!",
          buttons: [{type: "ok"}]
        });

        setTimeout(() => tg.close(), 1800);

      } catch (err) {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Отправить отзыв";
        tg.MainButton.hideProgress();

        tg.showAlert("Не удалось отправить отзыв\n" + (err.message || "Попробуйте позже"));
      }
    });

    checkForm();
  </script>

</body>
</html>
